# OpenTelemetry Collector configuration for Sagewai.
#
# Receives OTLP from the backend, then:
#   - Exposes metrics on :8889 for VictoriaMetrics to scrape (Prometheus format)
#   - Exports logs to VictoriaLogs via OTLP HTTP
#   - Traces logged to stdout (no persistent store yet)
#   - Health-check log noise filtered out

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  resource:
    attributes:
      - key: service.namespace
        value: sagewai
        action: upsert

  filter/health:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*health/summary.*"

exporters:
  # Metrics → Prometheus endpoint for VictoriaMetrics to scrape
  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  # Logs → VictoriaLogs (OTLP HTTP ingestion)
  otlphttp/victorialogs:
    endpoint: "http://victorialogs:9428/insert/opentelemetry"
    tls:
      insecure: true

  # Debug exporter for local development
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource, filter/health]
      exporters: [otlphttp/victorialogs, debug]
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
