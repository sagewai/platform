# OpenTelemetry Collector configuration for Sagewai.
#
# Receives OTLP (gRPC + HTTP) from the SDK backend, then:
#   - Exports metrics to VictoriaMetrics via Prometheus remote-write
#   - Exports logs to VictoriaLogs via the OTLP HTTP API
#   - Traces logged to stdout (no persistent store yet)
#   - Health-check log noise is filtered out

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  resource:
    attributes:
      - key: service.namespace
        value: sagewai
        action: upsert

  # Filter out health-check noise from logs (polled every 30s)
  filter/health:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*health/summary.*"

exporters:
  # Metrics → VictoriaMetrics (Prometheus remote-write)
  prometheusremotewrite:
    endpoint: "http://victoriametrics:8428/api/v1/write"
    tls:
      insecure: true

  # Logs → VictoriaLogs (OTLP HTTP ingestion)
  otlphttp/victorialogs:
    endpoint: "http://victorialogs:9428/insert/opentelemetry"
    tls:
      insecure: true

  # Debug exporter for local development
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource, filter/health]
      exporters: [otlphttp/victorialogs, debug]
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
