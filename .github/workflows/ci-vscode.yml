name: ci-vscode

on:
  push:
    branches: [main]
    paths:
      - 'apps/vscode-extension/**'
      - '.github/workflows/ci-vscode.yml'
  pull_request:
    paths:
      - 'apps/vscode-extension/**'
      - '.github/workflows/ci-vscode.yml'

concurrency:
  group: ci-vscode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: TypeScript check
        working-directory: apps/vscode-extension
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi
      - name: Package vsix (dry-run)
        working-directory: apps/vscode-extension
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies --out /tmp/sagewai-extension.vsix || true
