name: ci-vscode

on:
  push:
    branches: [main]
    paths:
      - 'apps/vscode-extension/**'
      - '.github/workflows/ci-vscode.yml'
  pull_request:
    paths:
      - 'apps/vscode-extension/**'
      - '.github/workflows/ci-vscode.yml'

concurrency:
  group: ci-vscode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: TypeScript check
        working-directory: apps/vscode-extension
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi
      - name: Package vsix (dry-run)
        working-directory: apps/vscode-extension
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies --out /tmp/sagewai-extension.vsix || true
