name: ci-sdk

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-sdk.yml'
  pull_request:
    paths:
      - 'packages/sdk/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-sdk.yml'

concurrency:
  group: ci-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Full 3.10+3.13 matrix on push-to-main; 3.13-only on PRs. The 3.10
    # floor is re-checked at merge, halving per-PR test cost. (matrix is set
    # via a conditional fromJSON expression keyed on the event.)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.13"]') || fromJSON('["3.10", "3.13"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-packages --group test
      - run: uv run --package sagewai pytest packages/sdk/tests/ -m "not integration" -o "addopts="

  lint:
    # Advisory only: the SDK isn't ruff-clean yet (~360 findings tracked
    # separately), so this surfaces lint drift without gating the merge.
    # Runs ruff standalone via `uvx` (no `uv sync`) so an advisory check
    # doesn't pay for a full all-packages install. ruff is pinned for
    # reproducibility; bump it deliberately when the cleanup lands. mypy
    # was dropped — it was also continue-on-error (never gated) and needed
    # the heavy install to say anything useful.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Ruff (advisory)
        run: uvx ruff@0.15.16 check packages/sdk/sagewai/
        continue-on-error: true

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - name: Vulnerability audit
        # CVE-2026-3219: pip 26.0.1; no fix version published yet.
        # --skip-editable: ignore local editable installs (sagewai,
        # sagewai-tool-runner) — pip-audit cannot resolve them on PyPI.
        run: |
          uv run --with pip-audit pip-audit --skip-editable \
            --ignore-vuln CVE-2026-3219
      - name: Licence check
        run: uv run --with pip-licenses pip-licenses --allow-only="MIT;Apache-2.0;Apache Software License;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;PSF-2.0;Python-2.0;Python Software Foundation License;MPL-2.0;Mozilla Public License 2.0 (MPL 2.0);The Unlicense;Historical Permission Notice and Disclaimer (HPND);ISC License (ISCL);MIT License;Apache-2.0 OR MIT"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv build --package sagewai --out-dir packages/sdk/dist
      - name: Verify wheel installs
        run: |
          uv venv --seed /tmp/test-venv
          /tmp/test-venv/bin/pip install packages/sdk/dist/sagewai-*.whl
          /tmp/test-venv/bin/python -c "import sagewai; print(f'Sagewai {sagewai.__version__} installed successfully')"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdk-dist
          path: packages/sdk/dist/
