name: release-vscode

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Sync version from tag
        working-directory: apps/vscode-extension
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          node -e "const f='package.json';const p=require('./'+f);p.version='$TAG';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"

      - name: Publish to VS Code Marketplace
        working-directory: apps/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Publish to Open VSX (optional)
        working-directory: apps/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          npm install -g ovsx
          ovsx publish --pat "$OVSX_PAT"
