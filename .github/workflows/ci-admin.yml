name: ci-admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @sagewai/admin build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build admin Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          push: false
          tags: sagewai-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
