name: ci-admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/sdk/sagewai/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'packages/sdk/sagewai/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC nightly — a11y + full e2e suite
  workflow_dispatch:       # on-demand runs of the nightly suites (a11y + e2e)

# CI-cost note: build / e2e-regression / docker-build run on every PR and on
# push-to-main (the merge gate). The a11y and full Playwright `e2e` suites run
# nightly (and on-demand via workflow_dispatch) — not per-PR — to keep Actions
# minutes down. The e2e suite was paused for one cycle while a shared-token
# eviction bug (and a few selector drifts) were fixed; it is green again.

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @sagewai/admin build
      - name: Audit JS deps
        run: pnpm audit --audit-level=high
        continue-on-error: true

  e2e-regression:
    # Regression suite that locks in the fixes for the four admin-panel
    # bugs shipped in apps/admin/e2e/13-regression-history.spec.ts:
    #   1. Saved playground agent appears on /agents
    #   2. Playground run persisted and visible on /agents/runs
    #   3. Inline workflow agents recorded as workflow_step rows
    #   4. /workflows/history/<id> renders Stats/Events/Cost Flow/
    #      Canvas/Replay without paywall.
    # Scoped to the single regression spec intentionally — the wider
    # e2e suite has unrelated pre-existing failures that will be
    # cleaned up in a separate task.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.13'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - name: Sync Python deps (including sagewai[fastapi] for the serve CLI)
        run: uv sync --package sagewai --extra fastapi
      - name: Install JS deps
        run: pnpm install --frozen-lockfile=false
      - name: Install Playwright chromium
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run regression spec
        env:
          CI: 'true'
        run: pnpm --filter @sagewai/admin exec playwright test 13-regression-history --reporter=list
      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build admin Docker image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/admin
          push: false
          tags: sagewai-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  a11y:
    # Heavy Playwright run — nightly (plus on-demand), not per-PR/per-merge.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.13'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - name: Sync Python deps
        run: uv sync --package sagewai --extra fastapi
      - name: Install JS deps
        run: pnpm install --frozen-lockfile=false
      - name: Install Playwright chromium
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run a11y tests (WCAG AA — blocks merge on violations)
        env:
          CI: 'true'
        run: pnpm --filter @sagewai/admin test:e2e:a11y
      - name: Upload a11y report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a11y-report
          path: apps/admin/playwright-report/
          retention-days: 7

  e2e:
    # Full Playwright suite — nightly (plus on-demand via workflow_dispatch).
    # Un-paused 2026-06-08 after the root-cause fixes: the shared bootstrap
    # session token was being evicted mid-run (active-token cap of 200 < the
    # suite's >200 silentRefresh rotations), so every test past ~#110 redirected
    # to /login; the e2e backend now raises the cap via
    # SAGEWAI_ADMIN_MAX_SESSION_TOKENS. A handful of selector/mock drifts were
    # fixed alongside. Not a per-PR/merge gate (the fast e2e-regression spec is).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v7
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile=false
      - name: Sync Python deps (backend needs the fastapi extra)
        run: uv sync --package sagewai --extra fastapi
      - name: Install Playwright browsers
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run full e2e suite
        run: pnpm --filter @sagewai/admin exec playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7
