name: ci-admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/sdk/sagewai/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'packages/sdk/sagewai/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @sagewai/admin build
      - name: Audit JS deps
        run: pnpm audit --audit-level=high
        continue-on-error: true

  e2e-regression:
    # Regression suite that locks in the fixes for the four admin-panel
    # bugs shipped in apps/admin/e2e/13-regression-history.spec.ts:
    #   1. Saved playground agent appears on /agents
    #   2. Playground run persisted and visible on /agents/runs
    #   3. Inline workflow agents recorded as workflow_step rows
    #   4. /workflows/history/<id> renders Stats/Events/Cost Flow/
    #      Canvas/Replay without paywall.
    # Scoped to the single regression spec intentionally — the wider
    # e2e suite has unrelated pre-existing failures that will be
    # cleaned up in a separate task.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.13'
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - name: Sync Python deps (including sagewai[fastapi] for the serve CLI)
        run: uv sync --package sagewai --extra fastapi
      - name: Install JS deps
        run: pnpm install --frozen-lockfile=false
      - name: Install Playwright chromium
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run regression spec
        env:
          CI: 'true'
        run: pnpm --filter @sagewai/admin exec playwright test 13-regression-history --reporter=list
      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build admin Docker image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: apps/admin
          push: false
          tags: sagewai-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile=false
      - name: Sync Python deps (backend needs the fastapi extra)
        run: uv sync --package sagewai --extra fastapi
      - name: Install Playwright browsers
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run full e2e suite
        run: pnpm --filter @sagewai/admin exec playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7
