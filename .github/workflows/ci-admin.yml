name: ci-admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @sagewai/admin build
      - name: Audit JS deps
        run: pnpm audit --audit-level=high
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build admin Docker image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: apps/admin
          push: false
          tags: sagewai-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v7
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile=false
      - name: Sync Python deps (backend needs the fastapi extra)
        run: uv sync --package sagewai --extra fastapi
      - name: Install Playwright browsers
        run: pnpm --filter @sagewai/admin exec playwright install --with-deps chromium
      - name: Run full e2e suite
        run: pnpm --filter @sagewai/admin exec playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7
