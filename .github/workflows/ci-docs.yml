name: ci-docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-docs.yml'
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-docs.yml'

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @sagewai/docs build
