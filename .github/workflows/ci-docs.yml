name: ci-docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-docs.yml'
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-docs.yml'

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Audit JS deps
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build (Next.js static export → apps/docs/out)
        run: pnpm --filter @sagewai/docs build

      - name: Verify out/ is populated
        working-directory: apps/docs
        run: |
          if [ ! -d out ] || [ -z "$(ls -A out 2>/dev/null)" ]; then
            echo "::error::apps/docs/out is missing or empty"
            exit 1
          fi
          echo "out/ contains $(find out -type f | wc -l | tr -d ' ') files"

      - name: Wrangler dry-run (bundle validation, no publish)
        working-directory: apps/docs
        run: npx wrangler deploy --dry-run
