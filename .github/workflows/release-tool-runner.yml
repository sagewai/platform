name: release-tool-runner

on:
  push:
    tags: ['v*.*.*']

permissions:
  id-token: write    # trusted-publishers to PyPI
  contents: read
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sagewai-tool-runner/
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync tool-runner version to SDK tag
        working-directory: packages/tool-runner
        run: |
          python -c "
          import pathlib
          p = pathlib.Path('pyproject.toml')
          content = p.read_text()
          version = '${{ steps.meta.outputs.version }}'
          new = content.replace('version = \"0.1.0\"', f'version = \"{version}\"', 1)
          p.write_text(new)
          "
          sed -i "s/^__version__ = .*/__version__ = \"${{ steps.meta.outputs.version }}\"/" \
              sagewai_tool_runner/__init__.py

      - name: Build wheel
        working-directory: packages/tool-runner
        run: uv build --out-dir dist

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: packages/tool-runner/dist/
          artifact-name: tool-runner-sbom
          format: cyclonedx-json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-path: packages/tool-runner/dist/*

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1
        with:
          packages-dir: packages/tool-runner/dist
