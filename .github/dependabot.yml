version: 2

# CI-cost note: schedule is monthly and each ecosystem groups its
# minor/patch bumps into a single PR (majors still open individually,
# so risky upgrades stay reviewable). This collapses what used to be
# ~50 separate PRs/week — each triggering a full CI matrix — into a
# handful of grouped PRs/month.

updates:
  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/packages/sdk"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:sdk"
    commit-message:
      prefix: "chore(sdk):"
    groups:
      sdk-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # transformers >=5.2.0 breaks our pinned gliner==0.2.26, which caps
      # transformers <5.2.0. Re-enable once gliner relaxes its upper bound.
      - dependency-name: "transformers"
        versions:
          - ">=5.2.0"
      # Hold pymilvus on the stable 2.6.x line: pymilvus 3.x targets the
      # Milvus 3.0 server, but our docker-compose pins the Milvus server to
      # v2.6.17. Allow minor/patch, block majors until stable Milvus 3 ships.
      - dependency-name: "pymilvus"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    commit-message:
      prefix: "chore(ci):"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Admin UI (npm)
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docs site (npm)
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:docs"
    commit-message:
      prefix: "chore(docs):"
    groups:
      docs-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/apps/vscode-extension"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:vscode"
    commit-message:
      prefix: "chore(vscode):"
    groups:
      vscode-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Backend Docker image
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:backend"
    commit-message:
      prefix: "chore(backend):"
    groups:
      backend-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Admin Docker image
  - package-ecosystem: "docker"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
