version: 2

# CI-cost note: schedule is monthly and each ecosystem groups its
# minor/patch bumps into a single PR (majors still open individually,
# so risky upgrades stay reviewable). This collapses what used to be
# ~50 separate PRs/week — each triggering a full CI matrix — into a
# handful of grouped PRs/month.

updates:
  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/packages/sdk"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:sdk"
    commit-message:
      prefix: "chore(sdk):"
    groups:
      sdk-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # transformers 5.x does not resolve: docling-ibm-models (via
      # docling-slim[standard]) requires an older transformers, and
      # gliner==0.2.26 caps transformers <5.2.0. Both 5.9.0 (#393) and
      # 5.1.0 (#409) failed universal resolution. Block all of 5.x until
      # docling and gliner support it.
      - dependency-name: "transformers"
        versions:
          - ">=5.0.0"
      # Hold pymilvus on the stable 2.6.x line: pymilvus 3.x targets the
      # Milvus 3.0 server, but our docker-compose pins the Milvus server to
      # v2.6.17. Allow minor/patch, block majors until stable Milvus 3 ships.
      - dependency-name: "pymilvus"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    commit-message:
      prefix: "chore(ci):"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Admin UI (npm)
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docs site (npm)
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:docs"
    commit-message:
      prefix: "chore(docs):"
    groups:
      docs-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/apps/vscode-extension"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:vscode"
    commit-message:
      prefix: "chore(vscode):"
    groups:
      vscode-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Backend Docker image
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:backend"
    commit-message:
      prefix: "chore(backend):"
    groups:
      backend-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Python 3.14 isn't in our CI test matrix (3.10/3.13) and no
      # docker-build/test exercises it (#386, #407). Block 3.14+ so it stops
      # re-proposing monthly; a future 3.13 bump (tested) is still allowed.
      # Lift this once 3.14 is added to CI.
      - dependency-name: "python"
        versions:
          - ">=3.14"

  # Admin Docker image
  - package-ecosystem: "docker"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
