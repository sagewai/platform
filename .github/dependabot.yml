version: 2
updates:
  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/packages/sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:sdk"
    commit-message:
      prefix: "chore(sdk):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    commit-message:
      prefix: "chore(ci):"

  # Admin UI (npm)
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"

  # Docs site (npm)
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:docs"
    commit-message:
      prefix: "chore(docs):"

  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/apps/vscode-extension"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:vscode"
    commit-message:
      prefix: "chore(vscode):"

  # Backend Docker image
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:backend"
    commit-message:
      prefix: "chore(backend):"

  # Admin Docker image
  - package-ecosystem: "docker"
    directory: "/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
