version: 2

# Unified monthly dependency policy
# ---------------------------------
# Every ecosystem runs ONCE A MONTH, all at the same time
# (Europe/Berlin 06:00), and groups ALL of its updates — patch, minor,
# AND major — into a single PR per ecosystem. Known-incompatible majors
# are held back via `ignore`. Net effect: one coordinated batch of a few
# grouped PRs per month (each gated by CI), not a stream of individual PRs.

updates:
  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/packages/sdk"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:sdk"
    commit-message:
      prefix: "chore(sdk):"
    groups:
      sdk-dependencies:
        patterns:
          - "*"
    ignore:
      # transformers 5.x does not resolve: docling-ibm-models requires an
      # older transformers and gliner caps transformers <5.2.0. Block 5.x
      # until docling and gliner support it.
      - dependency-name: "transformers"
        versions:
          - ">=5.0.0"
      # Hold pymilvus on 2.6.x: 3.x targets the Milvus 3.0 server but our
      # compose pins Milvus to v2.6.17. Block majors until stable Milvus 3.
      - dependency-name: "pymilvus"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    commit-message:
      prefix: "chore(ci):"
    groups:
      github-actions:
        patterns:
          - "*"

  # Admin UI (npm)
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-npm:
        patterns:
          - "*"

  # Docs site (npm)
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:docs"
    commit-message:
      prefix: "chore(docs):"
    groups:
      docs-npm:
        patterns:
          - "*"

  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/apps/vscode-extension"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:vscode"
    commit-message:
      prefix: "chore(vscode):"
    groups:
      vscode-npm:
        patterns:
          - "*"

  # Backend Docker image
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:backend"
    commit-message:
      prefix: "chore(backend):"
    groups:
      backend-docker:
        patterns:
          - "*"
    ignore:
      # Python 3.14 isn't in our CI matrix (3.10/3.13). Block 3.14+ until added.
      - dependency-name: "python"
        versions:
          - ">=3.14"

  # Admin Docker image
  - package-ecosystem: "docker"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "sagecurator"
    labels:
      - "security"
      - "pillar:admin"
    commit-message:
      prefix: "chore(admin):"
    groups:
      admin-docker:
        patterns:
          - "*"
