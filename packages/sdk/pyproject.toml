[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sagewai"
version = "0.1.0"
description = "Open-source AI agent platform for production workloads — full-stack, durable, safe, and model-agnostic."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "Ali Arda Diri", email = "arda@sagewai.ai"}]
keywords = [
    "ai",
    "agents",
    "mcp",
    "llm",
    "enterprise",
    "agentic",
    "orchestration",
    "rag",
    "workflows",
    "model-context-protocol",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "litellm>=1.30.0,<1.84",
    "google-genai>=1.0.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.25.0",
    "tenacity>=8.2.0",
    "pyjwt>=2.11.0",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "pyyaml>=6.0",
    "click>=8.3.1",
    "pymilvus>=2.6.9",
]

[project.urls]
Homepage = "https://sagewai.ai"
Documentation = "https://docs.sagewai.ai"
Repository = "https://github.com/sagewai/sagewai"
Issues = "https://github.com/sagewai/sagewai/issues"
Changelog = "https://github.com/sagewai/sagewai/blob/main/CHANGELOG.md"

[project.optional-dependencies]
memory = [
    "docling>=2.0.0",
    "tree-sitter-languages>=1.10.0",
    "tiktoken>=0.5.0",
    "pymilvus>=2.3.0",
    "nebula3-python>=3.5.0",
]
fastapi = [
    "fastapi>=0.100.0",
    "sse-starlette>=1.6.0",
]
postgres = [
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
]
prometheus = [
    "prometheus_client>=0.20.0",
]
storage = [
    "boto3>=1.28.0",
    "google-cloud-storage>=2.10.0",
]
intelligence = [
    "sentence-transformers>=3.0.0",
    "lingua-language-detector>=2.0.0",
    "gliner>=0.2.0",
]
multimodal = [
    "faster-whisper>=1.0.0",
    "Pillow>=10.0.0",
]
intelligence-full = [
    "sagewai[intelligence,multimodal]",
    "transformers>=4.40.0",
    "torch>=2.0.0",
]
all = [
    "sagewai[memory,fastapi,postgres,prometheus,storage,intelligence,multimodal]",
]

[dependency-groups]
test = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-httpx>=0.30.0",
    "fastapi>=0.100.0",
    "sse-starlette>=1.6.0",
    "httpx>=0.25.0",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "prometheus_client>=0.20.0",
    "boto3>=1.28.0",
    "google-cloud-storage>=2.10.0",
]

[project.scripts]
sagewai = "sagewai.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["sagewai"]

[tool.hatch.build.targets.sdist]
exclude = [
    "scripts/",
    "Makefile",
    ".github/",
    ".venv/",
    "dist/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".ruff_cache/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests that require external services (PostgreSQL)",
]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
ignore_missing_imports = true
