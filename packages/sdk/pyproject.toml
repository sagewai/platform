[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sagewai"
version = "1.0.0"
description = "Sagewai is the autonomous agent platform: describe the goal, we design the agents, run them in production, and fine-tune local models so every run gets cheaper."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "Ali Arda Diri", email = "arda@sagewai.ai"}]
keywords = [
    "ai",
    "agents",
    "mcp",
    "llm",
    "enterprise",
    "agentic",
    "orchestration",
    "rag",
    "workflows",
    "model-context-protocol",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "litellm==1.88.0",
    "google-genai==2.8.0",
    "pydantic>=2.12.5",
    "python-dotenv==1.2.2",
    "httpx==0.28.1",
    "tenacity==9.1.4",
    "pyjwt==2.13.0",
    "opentelemetry-api==1.42.1",
    "opentelemetry-sdk==1.42.1",
    "pyyaml==6.0.3",
    "click>=8.4.1",
    "pymilvus==2.6.15",
    "cryptography==48.0.1",
    "mnemonic==0.21",
    "duckduckgo-search==8.1.1",
    "pypdf==6.13.3",
    "readability-lxml==0.8.4.1",
    # Durable local persistence (SQLite default; Postgres via SAGEWAI_DATABASE_URL).
    "sqlalchemy[asyncio]==2.0.50",
    "aiosqlite==0.22.1",
    "sqlite-vec==0.1.9",
    # Web/admin server stack — base deps so `pip install sagewai` yields a
    # working CLI and `sagewai admin serve` (the documented quickstart).
    "fastapi==0.136.3",
    "sse-starlette==3.4.4",
    "uvicorn==0.49.0",
    "python-multipart==0.0.32",
]

[project.urls]
Homepage = "https://sagewai.ai"
Documentation = "https://docs.sagewai.ai"
Repository = "https://github.com/sagewai/platform"
Issues = "https://github.com/sagewai/platform/issues"
Changelog = "https://github.com/sagewai/platform/blob/main/CHANGELOG.md"

[project.optional-dependencies]
memory = [
    "docling==2.97.0",
    "tree-sitter-languages==1.10.2",
    "tiktoken==0.13.0",
    "pymilvus==2.6.15",
    "nebula3-python==3.8.3",
]
coap = [
    "aiocoap==0.4.17",
]
modbus = [
    "pymodbus==3.13.0",
]
mqtt = [
    "aiomqtt==2.5.1",
]
opcua = [
    "asyncua==2.0",
]
websocket = [
    "websockets==16.0",
    "jsonpath-ng==1.8.0",
]
grpc = [
    "grpcio==1.81.0",
    "grpcio-reflection==1.81.0",
]
# fastapi/uvicorn/python-multipart are now base dependencies (the CLI and
# `sagewai admin serve` require them). This extra is kept as a no-op alias so
# `pip install "sagewai[fastapi]"` keeps working for anyone who pinned it.
fastapi = []
postgres = [
    "asyncpg==0.31.0",
    "alembic==1.18.4",
]
prometheus = [
    "prometheus_client==0.25.0",
]
storage = [
    "boto3==1.43.24",
    "google-cloud-storage==3.11.0",
]
intelligence = [
    "sentence-transformers==5.5.1",
    "lingua-language-detector==2.1.1",
    "gliner==0.2.26",
]
multimodal = [
    "faster-whisper==1.2.1",
    "Pillow==12.2.0",
]
intelligence-full = [
    "sagewai[intelligence,multimodal]",
    "transformers==4.57.6",
    "torch==2.12.0",
]
all = [
    "sagewai[memory,fastapi,postgres,prometheus,storage,intelligence,multimodal]",
]
sandbox = [
    "aiodocker==0.27.0",
]
kubernetes = [
    "kubernetes_asyncio==36.1.0",
]
keychain = [
    "keyring==25.7.0",
]
vault = [
    "hvac==2.4.0",
]

[dependency-groups]
test = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "pytest-httpx>=0.36.2",
    "fastapi>=0.136.3",
    "sse-starlette>=3.4.4",
    "uvicorn>=0.49.0",
    "python-multipart==0.0.32",
    "httpx>=0.25.0",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.50",
    "aiosqlite==0.22.1",
    "alembic>=1.13.0",
    "prometheus_client>=0.20.0",
    "boto3>=1.43.24",
    "google-cloud-storage>=3.11.0",
    "kubernetes-asyncio==36.1.0",
    "hvac==2.4.0",
    "respx==0.23.1",
    "aiocoap==0.4.17",
    "pymodbus==3.13.0",
    "asyncua==2.0",
    "websockets==16.0",
    "jsonpath-ng==1.8.0",
    "aiomqtt==2.5.1",
    "grpcio==1.81.0",
    "grpcio-reflection==1.81.0",
    "sqlite-vec==0.1.9",
]

[project.scripts]
sagewai = "sagewai.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["sagewai"]

[tool.hatch.build.targets.sdist]
exclude = [
    "scripts/",
    "Makefile",
    ".github/",
    ".venv/",
    "dist/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".ruff_cache/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests that require external services (PostgreSQL)",
    "perf: performance micro-benchmarks with fixed time budgets",
    "soak: long-running memory & RAG soak tests — not part of default suite",
]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
ignore_missing_imports = true
