[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sagewai"
version = "0.1.1"
description = "Sagewai is the autonomous agent platform: describe the goal, we design the agents, run them in production, and fine-tune local models so every run gets cheaper."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "Ali Arda Diri", email = "arda@sagewai.ai"}]
keywords = [
    "ai",
    "agents",
    "mcp",
    "llm",
    "enterprise",
    "agentic",
    "orchestration",
    "rag",
    "workflows",
    "model-context-protocol",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "litellm==1.84.0",
    "google-genai==1.74.0",
    "pydantic>=2.12.5",
    "python-dotenv==1.2.2",
    "httpx==0.28.1",
    "tenacity==9.1.4",
    "pyjwt==2.12.1",
    "opentelemetry-api==1.41.1",
    "opentelemetry-sdk==1.41.1",
    "pyyaml==6.0.3",
    "click>=8.1.0",
    "pymilvus==2.6.12",
    "cryptography==47.0.0",
    "mnemonic==0.21",
]

[project.urls]
Homepage = "https://sagewai.ai"
Documentation = "https://docs.sagewai.ai"
Repository = "https://github.com/sagewai/platform"
Issues = "https://github.com/sagewai/platform/issues"
Changelog = "https://github.com/sagewai/platform/blob/main/CHANGELOG.md"

[project.optional-dependencies]
memory = [
    "docling==2.93.0",
    "tree-sitter-languages==1.10.2",
    "tiktoken==0.13.0",
    "pymilvus==2.6.12",
    "nebula3-python==3.8.3",
]
fastapi = [
    "fastapi==0.136.1",
    "sse-starlette==3.4.4",
    "uvicorn==0.47.0",
]
postgres = [
    "asyncpg==0.31.0",
    "sqlalchemy[asyncio]==2.0.49",
    "alembic==1.18.4",
]
prometheus = [
    "prometheus_client==0.25.0",
]
storage = [
    "boto3==1.43.9",
    "google-cloud-storage==3.10.1",
]
intelligence = [
    "sentence-transformers==5.5.0",
    "lingua-language-detector==2.1.1",
    "gliner==0.2.26",
]
multimodal = [
    "faster-whisper==1.2.1",
    "Pillow==12.2.0",
]
intelligence-full = [
    "sagewai[intelligence,multimodal]",
    "transformers==4.57.6",
    "torch==2.12.0",
]
all = [
    "sagewai[memory,fastapi,postgres,prometheus,storage,intelligence,multimodal]",
]
sandbox = [
    "aiodocker==0.26.0",
]
kubernetes = [
    "kubernetes_asyncio==35.0.1",
]
keychain = [
    "keyring==25.7.0",
]
vault = [
    "hvac==2.4.0",
]

[dependency-groups]
test = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-httpx>=0.36.2",
    "fastapi>=0.136.1",
    "sse-starlette>=3.4.4",
    "uvicorn>=0.47.0",
    "httpx>=0.25.0",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "prometheus_client>=0.20.0",
    "boto3>=1.43.9",
    "google-cloud-storage>=2.10.0",
    "kubernetes-asyncio==35.0.1",
    "hvac==2.4.0",
]

[project.scripts]
sagewai = "sagewai.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["sagewai"]

[tool.hatch.build.targets.sdist]
exclude = [
    "scripts/",
    "Makefile",
    ".github/",
    ".venv/",
    "dist/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".ruff_cache/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests that require external services (PostgreSQL)",
    "perf: performance micro-benchmarks with fixed time budgets",
    "soak: long-running memory & RAG soak tests — not part of default suite",
]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
ignore_missing_imports = true
