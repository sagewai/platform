id: github
version: 0.1.0
title: GitHub API
description: |
  Read repositories, issues, and pull requests via the GitHub REST API.
category: developer_tools
kind: http
sandbox_tier: SANDBOXED
exec:
  http:
    base_url: https://api.github.com
    auth:
      kind: bearer
      header: Authorization
      prefix: "Bearer "
    operations:
      get_repo:
        method: GET
        path: /repos/{owner}/{repo}
        input_schema:
          type: object
          required: [owner, repo]
          properties:
            owner: { type: string }
            repo:  { type: string }
        output_schema:
          type: object
          properties:
            id:        { type: integer }
            name:      { type: string }
            full_name: { type: string }
scopes:
  - network.outbound.fetch
  - secrets.github_token
setup:
  auth_complexity: api_key
  signup_url: https://github.com/signup
  console_path: Settings → Developer settings → Personal access tokens → Fine-grained tokens
  key_format: "ghp_… or github_pat_…"
  required_scopes:
    - "Contents: Read"
    - "Metadata: Read"
  test_endpoint:
    operation: get_repo
    inputs: { owner: octocat, repo: hello-world }
    expected_status: 200
  body: |
    1. Sign in at https://github.com.
    2. Settings → Developer settings → Personal access tokens → Fine-grained tokens.
    3. **Generate new token**; restrict to the repos you want Sagewai to read.
    4. Grant `Contents: Read` and `Metadata: Read`. Leave everything else off.
    5. Copy the `github_pat_…` value into Sagewai → Connections → Add → GitHub.
