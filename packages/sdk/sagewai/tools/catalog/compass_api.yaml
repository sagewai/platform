id: compass_api
version: 0.1.0
title: Atlassian Compass — Service catalog
description: |
  Read components and push deployment events to Atlassian Compass via
  GraphQL. Same Atlassian API token works for Jira / Confluence / Compass.
category: service_catalog
kind: sdk
sandbox_tier: SANDBOXED
exec:
  sdk:
    entrypoint: sagewai.tools.builtins.compass:compass_api
scopes:
  - network.outbound.fetch
  - secrets.atlassian_token
  - service.catalog
setup:
  auth_complexity: api_key
  credential_fields:
    - name: USERNAME
      label: "Atlassian Email"
      type: text
      description: "Your Atlassian account email"
    - name: PASSWORD
      label: "API Token"
      type: password
      description: "From id.atlassian.com/manage-profile/security/api-tokens"
    - name: COMPASS_SITE
      label: "Compass Site URL"
      type: text
      description: "Full URL like https://acme.atlassian.net (no trailing slash)"
  signup_url: https://www.atlassian.com/software/compass
  console_path: "id.atlassian.com/manage-profile/security/api-tokens → Create API token"
  key_format: "Email + API token + site URL"
  body: |
    1. Same Atlassian API token works for Jira/Confluence/Compass.
       Get it from id.atlassian.com/manage-profile/security/api-tokens.
    2. Paste your email, the token, and your Atlassian site URL
       (e.g. `https://acme.atlassian.net`) into Sagewai → Connections →
       Tools → Add Compass.

    Operations exposed:
    - `get_component`: fetch a single component by ARI.
    - `list_components`: list components in a workspace (`cloudId`).
    - `create_event`: push a deployment/build event to a component.

    For the workspace `cloudId`, use Compass → Settings → Workspace
    → copy the Cloud ID.
