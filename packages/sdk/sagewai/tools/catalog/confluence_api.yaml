id: confluence_api
version: 0.1.0
title: Confluence Cloud — Pages and spaces
description: |
  List spaces, read/create pages via the Confluence Cloud REST API v2.
  Site URL is operator-specific (e.g. `acme.atlassian.net`) and provided
  via the `CONFLUENCE_SITE` credential.
category: knowledge_management
kind: http
sandbox_tier: SANDBOXED
exec:
  http:
    base_url: https://example.atlassian.net
    runtime_base_url_field: CONFLUENCE_SITE
    auth:
      kind: basic
    operations:
      get_current_user:
        method: GET
        path: /wiki/api/v2/users/current
        input_schema: { type: object }
        output_schema:
          type: object
          properties:
            accountId:   { type: string }
            displayName: { type: string }
      list_spaces:
        method: GET
        path: /wiki/api/v2/spaces
        input_schema:
          type: object
          properties:
            limit: { type: integer, minimum: 1, maximum: 250 }
            type:  { enum: [global, personal, collaboration, knowledge_base] }
        output_schema:
          type: object
          properties:
            results: { type: array }
      get_page:
        method: GET
        path: /wiki/api/v2/pages/{id}
        input_schema:
          type: object
          required: [id]
          properties:
            id: { type: string }
        output_schema:
          type: object
          properties:
            id:      { type: string }
            title:   { type: string }
            body:    { type: object }
            version: { type: object }
      create_page:
        method: POST
        path: /wiki/api/v2/pages
        input_schema:
          type: object
          required: [spaceId, title, body]
          properties:
            spaceId: { type: string }
            title:   { type: string }
            body:    { type: object }
        output_schema:
          type: object
          properties:
            id:    { type: string }
            title: { type: string }
scopes:
  - network.outbound.fetch
  - secrets.atlassian_token
  - knowledge.management
setup:
  auth_complexity: api_key
  credential_fields:
    - name: USERNAME
      label: "Atlassian Email"
      type: text
      description: "Your Atlassian account email"
    - name: PASSWORD
      label: "API Token"
      type: password
      description: "From id.atlassian.com/manage-profile/security/api-tokens"
    - name: CONFLUENCE_SITE
      label: "Confluence Site URL"
      type: text
      description: "Full URL like https://acme.atlassian.net (no trailing slash)"
  signup_url: https://www.atlassian.com/software/confluence
  console_path: "id.atlassian.com/manage-profile/security/api-tokens → Create API token"
  key_format: "Email + API token + site URL"
  test_endpoint:
    operation: get_current_user
    expected_status: 200
  body: |
    1. Log in at id.atlassian.com → Security → API tokens → Create API token.
       (Same Atlassian token works for Jira, Confluence, and Compass.)
    2. Copy the token.
    3. Paste your email, the API token, and your Confluence site URL
       (e.g. `https://acme.atlassian.net`) into Sagewai → Connections →
       Tools → Add Confluence.
