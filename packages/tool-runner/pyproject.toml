[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sagewai-tool-runner"
version = "0.1.0"
description = "In-sandbox tool runner for Sagewai. Speaks JSON-RPC 2.0 over stdio."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "Ali Arda Diri", email = "arda@sagewai.ai"}]
dependencies = [
    "pydantic>=2.12.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
sagewai-tool-runner = "sagewai_tool_runner.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["sagewai_tool_runner"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
