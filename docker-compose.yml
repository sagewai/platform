# Sagewai platform — one-command full stack.
#
# Starts postgres + redis + the Python FastAPI backend + the Next.js admin
# UI, all wired together. Use this for a "just works" local or small-prod
# demo instance.
#
# Usage:
#   just stack-up                             # LOCAL: build backend+admin images, then start
#   docker compose up -d                      # start from PUBLISHED ghcr.io images (deploys)
#   docker compose up -d --build              # ...or build backend+admin locally instead of pulling
#   docker compose logs -f                    # tail
#   docker compose down                       # stop
#   docker compose down -v                    # stop + wipe volumes (destructive)
#   docker compose --profile nebula up -d     # also bring up NebulaGraph
#   docker compose --profile milvus up -d     # also bring up Milvus
#
# URLs:
#   http://localhost:3008         # admin UI
#   http://localhost:8000/docs    # backend OpenAPI explorer
#   http://localhost:9669         # NebulaGraph graphd (when profile=nebula)
#   http://localhost:19530        # Milvus (when profile=milvus)
#
# Per-service control via justfile recipes:
#   just deps-up          # postgres + redis + nebula (data deps only)
#   just nebula-up        # bring up the 3-node NebulaGraph cluster
#   just milvus-up        # bring up the Milvus standalone stack
#   just pg-up / redis-up # individual data deps
#
# Data persistence:
#   postgres data lives in the `sagewai-pg-data` named volume. Safe across
#   `docker compose down` unless you pass `-v`.
#   the backend's admin account + master key + file config live in the
#   `sagewai-home` volume (SAGEWAI_HOME=/var/lib/sagewai) — survives recreates;
#   `docker compose down -v` wipes it, so you'd re-run /setup afterwards.
#   NebulaGraph data lives in `nebula-meta-data`, `nebula-storage-data`.
#   Milvus data lives in `milvus-etcd-data`, `milvus-minio-data`,
#   `milvus-standalone-data`.
#
# Image sources:
#   ghcr.io/sagewai/backend:latest — built from source (packages/sdk; repo-root context)
#   ghcr.io/sagewai/admin:latest   — built from source (apps/admin; Next.js)
#   vesoft/nebula-*:v3.8.0         — pinned to match nebula3-python==3.8.3
#   milvusdb/milvus:v2.6.17        — pinned to match pymilvus==2.6.14
#   Backend + admin also publish to GHCR on every v*.*.* tag via
#   .github/workflows/release-*.yml, but the recommended path is to build from
#   your checkout: `just stack-up` or `docker compose up -d --build`. No prebuilt
#   wheel or PyPI fallback — the images run exactly the source you cloned.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sagewai
      POSTGRES_USER: sagewai
      POSTGRES_PASSWORD: sagewai
    volumes:
      - sagewai-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagewai -d sagewai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/sagewai/backend:latest
    # Built from source: context is the repo root so the Dockerfile can build
    # packages/sdk in-image (mirrors release-backend.yml). No prebuilt wheel and
    # no PyPI fallback — `docker compose up -d --build` (or `just stack-up`)
    # builds exactly the checked-out source.
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sagewai:sagewai@postgres:5432/sagewai
      REDIS_URL: redis://redis:6379
      SAGEWAI_LOG_LEVEL: INFO
      # Persist SAGEWAI_HOME (the admin account, master key, and file-backed
      # config) on the sagewai-home volume below. /var/lib/sagewai is created and
      # chowned to the runtime user in the image. Without this, ~/.sagewai is
      # ephemeral: the admin account + master key are lost on every container
      # recreate, so you'd re-run /setup (and encrypted secrets would break).
      SAGEWAI_HOME: /var/lib/sagewai
      # Local LLM servers (Ollama, LM Studio) run on the HOST, not in this
      # container — so `localhost` here would mean the container itself and
      # provider auto-detection finds nothing. host.docker.internal resolves to
      # the host gateway (Docker Desktop and Podman both provide it), so the
      # backend can reach them. Change these if Ollama/LM Studio run elsewhere.
      OLLAMA_HOST: http://host.docker.internal:11434
      # litellm's Ollama client reads OLLAMA_API_BASE (not OLLAMA_HOST) for the
      # actual inference call. Without it, running an ollama model from the
      # Playground/agents falls back to localhost:11434 inside the container —
      # even though detection (which uses OLLAMA_HOST) works. (LM Studio
      # inference uses a per-provider api_base; configure an LM Studio provider.)
      OLLAMA_API_BASE: http://host.docker.internal:11434
      LMSTUDIO_HOST: http://host.docker.internal:1234/v1
    volumes:
      - sagewai-home:/var/lib/sagewai
    extra_hosts:
      # Map host.docker.internal to the host gateway. Podman provides this
      # automatically, but declaring it keeps Docker Engine + Compose working too.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/summary >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    image: ghcr.io/sagewai/admin:latest
    # Mirrors release-admin.yml (context apps/admin); self-contained Next.js build.
    # NEXT_PUBLIC_ADMIN_API_URL is a BUILD ARG (baked into the browser bundle +
    # the CSP), so it must be reachable from the browser: the published backend
    # port on the host (http://localhost:8000), NOT the docker-internal
    # backend:8000 hostname. Setting it as a runtime `environment:` does nothing
    # for the browser — NEXT_PUBLIC_* is inlined at build.
    build:
      context: apps/admin
      args:
        NEXT_PUBLIC_ADMIN_API_URL: http://localhost:8000/admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3008:3008"

  # ── NebulaGraph cluster (profile: nebula) ─────────────────────────────
  # Pinned to v3.8.0 to match nebula3-python==3.8.3 in pyproject.toml.
  # Three required services + a one-shot console init that registers
  # the storage host with the metad layer (vesoft's recommended bootstrap
  # for a fresh cluster). All four sit behind `profiles: [nebula]` so
  # `docker compose up -d` keeps its existing default-stack behaviour.

  nebula-metad:
    image: vesoft/nebula-metad:v3.8.0
    profiles: [nebula]
    restart: unless-stopped
    environment:
      USER: root
      TZ: "${TZ:-UTC}"
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-metad
      - --ws_ip=nebula-metad
      - --port=9559
      - --ws_http_port=19559
      - --data_path=/data/meta
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19559/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "9559:9559"
      - "19559:19559"
    volumes:
      - nebula-meta-data:/data/meta
      - nebula-meta-logs:/logs

  nebula-storaged:
    image: vesoft/nebula-storaged:v3.8.0
    profiles: [nebula]
    restart: unless-stopped
    depends_on:
      nebula-metad:
        condition: service_healthy
    environment:
      USER: root
      TZ: "${TZ:-UTC}"
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-storaged
      - --ws_ip=nebula-storaged
      - --port=9779
      - --ws_http_port=19779
      - --data_path=/data/storage
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19779/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "9779:9779"
      - "19779:19779"
    volumes:
      - nebula-storage-data:/data/storage
      - nebula-storage-logs:/logs

  nebula-graphd:
    image: vesoft/nebula-graphd:v3.8.0
    profiles: [nebula]
    restart: unless-stopped
    depends_on:
      nebula-metad:
        condition: service_healthy
      nebula-storaged:
        condition: service_healthy
    environment:
      USER: root
      TZ: "${TZ:-UTC}"
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --port=9669
      - --ws_ip=nebula-graphd
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19669/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "9669:9669"
      - "19669:19669"
    volumes:
      - nebula-graph-logs:/logs

  # One-shot init that registers nebula-storaged with the metad layer.
  # Without this, queries succeed against graphd but writes return
  # `Storage Error: part not found`. Re-running is safe (ADD HOSTS is
  # idempotent at the host level).
  nebula-console:
    image: vesoft/nebula-console:v3.8.0
    profiles: [nebula]
    restart: "no"
    depends_on:
      nebula-graphd:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          /usr/local/bin/nebula-console -addr nebula-graphd -port 9669 \
            -u root -p nebula \
            -e 'ADD HOSTS "nebula-storaged":9779' && exit 0
          echo "waiting for graphd…"
          sleep 2
        done
        echo "failed to register storaged with metad" >&2
        exit 1

  # ── Milvus standalone (profile: milvus) ───────────────────────────────
  # Vector store backing the SDK's MilvusVectorMemory and
  # MilvusContextVectorStore. Standalone Milvus needs an etcd (metadata)
  # and a minio (object storage) sidecar; all three sit behind
  # `profiles: [milvus]` so the default `docker compose up -d` stack is
  # unaffected. Image versions follow the official milvus-io standalone
  # template and are aligned with pymilvus==2.6.14 in
  # packages/sdk/pyproject.toml (Milvus 2.6.* ↔ pymilvus 2.6.X).
  # The SDK connects at http://localhost:19530.

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    profiles: [milvus]
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - milvus-etcd-data:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    profiles: [milvus]
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - milvus-minio-data:/minio_data

  milvus-standalone:
    image: milvusdb/milvus:v2.6.17
    profiles: [milvus]
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-standalone-data:/var/lib/milvus

volumes:
  sagewai-pg-data:
  sagewai-home:          # backend SAGEWAI_HOME — admin account, master key, file config
  nebula-meta-data:
  nebula-meta-logs:
  nebula-storage-data:
  nebula-storage-logs:
  nebula-graph-logs:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-standalone-data:
